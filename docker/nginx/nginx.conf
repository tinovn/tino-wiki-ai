worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # Extract tenant slug from subdomain: "acme" from "acme.ai.tino.vn"
    map $host $tenant_slug {
        ~^(?<sub>[^.]+)\.ai\.tino\.vn$  $sub;
        default                          "";
    }

    # Upstream definitions
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    upstream tenant_admin {
        server tenant-admin:3000;
    }

    upstream master_admin {
        server master-admin:3001;
    }

    # ============================================
    # HTTP -> HTTPS redirect (all domains)
    # ============================================
    server {
        listen 80;
        server_name ai.tino.vn *.ai.tino.vn;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # Master Admin + API: ai.tino.vn
    # ============================================
    server {
        listen 443 ssl http2;
        server_name ai.tino.vn;

        # SSL (wildcard cert covers *.ai.tino.vn too)
        ssl_certificate /etc/letsencrypt/live/ai.tino.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ai.tino.vn/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- API Backend ----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ---- Swagger Docs ----
        location /docs {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- WebSocket ----
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ---- Next.js static assets ----
        location /_next/static/ {
            proxy_pass http://master_admin;
            proxy_cache_valid 60m;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # ---- Master Admin (default for ai.tino.vn) ----
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://master_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================
    # Tenant Admin: *.ai.tino.vn
    # e.g. acme.ai.tino.vn, demo.ai.tino.vn
    # Subdomain = tenant slug
    # ============================================
    server {
        listen 443 ssl http2;
        server_name *.ai.tino.vn;

        # SSL (same wildcard cert)
        ssl_certificate /etc/letsencrypt/live/ai.tino.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ai.tino.vn/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- API Backend (pass tenant slug) ----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $tenant_slug;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ---- WebSocket ----
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Tenant-Slug $tenant_slug;
            proxy_read_timeout 86400;
        }

        # ---- Next.js static assets ----
        location /_next/static/ {
            proxy_pass http://tenant_admin;
            proxy_cache_valid 60m;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # ---- Tenant Admin (default) ----
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://tenant_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $tenant_slug;
        }
    }

    # ============================================
    # HTTP-only fallback (no SSL certs yet)
    # Uncomment these and comment HTTPS blocks above
    # ============================================
