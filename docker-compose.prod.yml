# ===========================================
# Tino Wiki AI - Production Docker Compose
# ===========================================
# Usage:
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
# ===========================================

services:
  # ===========================================
  # Infrastructure
  # ===========================================

  postgresql:
    image: postgres:16-alpine
    container_name: tino-wiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tino_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tino_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-tino_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tino_admin} -d ${POSTGRES_DB:-tino_master}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tino-network

  redis:
    image: redis:7-alpine
    container_name: tino-wiki-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tino-network

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: tino-wiki-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "/bin/sh -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tino-network

  # ===========================================
  # AI Services
  # ===========================================

  vllm:
    image: vllm/vllm-openai:v0.6.6
    container_name: tino-wiki-vllm
    restart: unless-stopped
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_ATTENTION_BACKEND: XFORMERS
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-72B-Instruct-GPTQ-Int4}
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.90
      --max-model-len 8192
      --trust-remote-code
      --quantization gptq
      --dtype float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    shm_size: '16gb'
    networks:
      - tino-network

  embedding:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    container_name: tino-wiki-embedding
    restart: unless-stopped
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      DEVICE: ${EMBEDDING_DEVICE:-cpu}
      BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      PORT: 8001
    volumes:
      - embedding_models:/app/models
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - tino-network

  # ===========================================
  # Application Services
  # ===========================================

  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: tino-wiki-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_ENV: production
      API_PREFIX: api/v1
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ai.tino.vn,https://*.ai.tino.vn}

      # Database
      MASTER_DATABASE_URL: postgresql://${POSTGRES_USER:-tino_admin}:${POSTGRES_PASSWORD:-tino_secret_2024}@postgresql:5432/${POSTGRES_DB:-tino_master}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0

      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}

      # LLM
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-vllm}
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-72B-Instruct-GPTQ-Int4}
      VLLM_API_KEY: ${VLLM_API_KEY:-}

      # LLM Fallbacks
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}

      # Embedding (BGE-M3 via local service)
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-vllm}
      EMBEDDING_BASE_URL: http://embedding:8001
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}

      # AI Processing
      CHUNK_MIN_TOKENS: ${CHUNK_MIN_TOKENS:-300}
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-800}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}
      MAX_SEARCH_RESULTS: ${MAX_SEARCH_RESULTS:-10}
    expose:
      - "3000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
    networks:
      - tino-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  master-admin:
    build:
      context: ./master-admin
      dockerfile: Dockerfile
    container_name: tino-wiki-master-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      - tino-network

  tenant-admin:
    build:
      context: ./tenant-admin
      dockerfile: Dockerfile
    container_name: tino-wiki-tenant-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - tino-network

  # ===========================================
  # Reverse Proxy
  # ===========================================

  nginx:
    image: nginx:alpine
    container_name: tino-wiki-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
      - master-admin
      - tenant-admin
    networks:
      - tino-network

  # ===========================================
  # Monitoring
  # ===========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: tino-wiki-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - tino-network

  grafana:
    image: grafana/grafana:latest
    container_name: tino-wiki-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - prometheus
    networks:
      - tino-network

  loki:
    image: grafana/loki:latest
    container_name: tino-wiki-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./docker/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - tino-network

  promtail:
    image: grafana/promtail:latest
    container_name: tino-wiki-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - tino-network

# ===========================================
# Networks
# ===========================================

networks:
  tino-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local
  embedding_models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  certbot_data:
    driver: local
